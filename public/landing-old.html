<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axon AI — Trợ lý học tập thông minh</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #050508;
  --surface: #0d0d14;
  --card:    #12121e;
  --border:  rgba(255,255,255,0.07);
  --accent:  #7c5cfc;
  --accent2: #00e5ff;
  --text:    #e8e8f0;
  --muted:   #6b6b80;
  --muted2:  #9090a8;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
}

.orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
.orb-1 { width: 700px; height: 700px; background: rgba(0,229,255,0.07); top: -200px; left: -200px; }
.orb-2 { width: 500px; height: 500px; background: rgba(124,92,252,0.05); bottom: -100px; right: -100px; }
.orb-3 { width: 400px; height: 400px; background: rgba(124,92,252,0.04); top: 40%; left: 60%; }

.cursor {
  position: fixed; width: 10px; height: 10px;
  background: var(--accent); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.15s;
}
.cursor-follower {
  position: fixed; width: 36px; height: 36px;
  border: 1.5px solid rgba(124,92,252,0.5); border-radius: 50%;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%, -50%);
  transition: all 0.18s ease;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 56px;
  background: rgba(8,11,18,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  animation: slideDown 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
@media(max-width:640px){ nav { padding: 16px 20px; } }

.nav-logo {
  display: flex; align-items: center; gap: 11px;
  font-weight: 800; font-size: 1.3rem; color: var(--text);
  text-decoration: none; letter-spacing: -0.02em;
}
.logo-box {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
}
.nav-status {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 100px;
  border: 1px solid var(--border);
  font-size: 0.8rem; color: var(--muted2);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22d36d; flex-shrink: 0; animation: pulse 2s infinite; }
.nav-cta {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 26px; border-radius: 100px;
  background: var(--accent); color: #ffffff;
  font-weight: 700; font-size: 0.92rem; text-decoration: none;
  box-shadow: 0 0 28px rgba(124,92,252,0.25);
  transition: opacity 0.2s, transform 0.2s;
}
.nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }

/* HERO */
.hero {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: grid; grid-template-columns: 1.1fr 0.9fr;
  align-items: center;
  padding: 130px 56px 90px;
  gap: 56px;
  max-width: 1340px; margin: 0 auto;
}
@media(max-width:960px){
  .hero { grid-template-columns: 1fr; padding: 120px 24px 70px; }
  .hero-visual { display: none; }
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 16px; border-radius: 100px;
  border: 1px solid rgba(124,92,252,0.2);
  background: rgba(124,92,252,0.07);
  font-size: 0.82rem; color: var(--accent); font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  margin-bottom: 38px;
  animation: fadeUp 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both;
}
.eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }

.hero-h1 {
  font-weight: 800;
  font-size: clamp(3.6rem, 7vw, 6.5rem);
  line-height: 1.12;
  letter-spacing: -0.045em;
  margin-bottom: 30px;
  animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
}
.hero-h1::before,
.hero-h1::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  line-height: 1.12;
  letter-spacing: -0.045em;
  font-weight: 800;
  font-size: clamp(3.6rem, 7vw, 6.5rem);
  pointer-events: none;
  white-space: pre;
}
.hero-h1::before { color: var(--accent2); z-index: -1; animation: glitch-1 3s infinite linear alternate-reverse; }
.hero-h1::after  { color: var(--accent);  z-index: -2; animation: glitch-2 2.5s infinite linear alternate-reverse; }

@keyframes glitch-1 {
  0%   { clip-path: inset(0 0 92% 0); transform: translate(0); }
  5%   { clip-path: inset(15% 0 70% 0); transform: translate(-4px, 1px); }
  10%  { clip-path: inset(60% 0 10% 0); transform: translate(3px, -1px); }
  15%  { clip-path: inset(0 0 92% 0); transform: translate(0); }
  20%  { clip-path: inset(80% 0 0 0); transform: translate(-2px, 2px); }
  25%  { clip-path: inset(0 0 92% 0); transform: translate(0); }
  50%  { clip-path: inset(35% 0 40% 0); transform: translate(5px, 0); }
  55%  { clip-path: inset(0 0 92% 0); transform: translate(0); }
  75%  { clip-path: inset(10% 0 75% 0); transform: translate(-3px, 1px); }
  80%  { clip-path: inset(0 0 92% 0); transform: translate(0); }
  100% { clip-path: inset(0 0 92% 0); transform: translate(0); }
}
@keyframes glitch-2 {
  0%   { clip-path: inset(92% 0 0 0); transform: translate(0); }
  7%   { clip-path: inset(40% 0 30% 0); transform: translate(3px, -1px); }
  14%  { clip-path: inset(92% 0 0 0); transform: translate(0); }
  21%  { clip-path: inset(5% 0 80% 0); transform: translate(-4px, 2px); }
  28%  { clip-path: inset(92% 0 0 0); transform: translate(0); }
  45%  { clip-path: inset(70% 0 5% 0); transform: translate(2px, 0); }
  52%  { clip-path: inset(92% 0 0 0); transform: translate(0); }
  70%  { clip-path: inset(20% 0 60% 0); transform: translate(-5px, -2px); }
  77%  { clip-path: inset(92% 0 0 0); transform: translate(0); }
  100% { clip-path: inset(92% 0 0 0); transform: translate(0); }
}

.h1-outline { color: transparent; -webkit-text-stroke: 2px rgba(255,255,255,0.3); font-style: italic; }
.h1-lime    { color: var(--accent); }

.hero-desc {
  font-size: 1.18rem; color: var(--muted2); line-height: 1.8;
  max-width: 480px; margin-bottom: 48px; font-weight: 300;
  animation: fadeUp 0.8s 0.3s cubic-bezier(0.16,1,0.3,1) both;
}
.hero-btns {
  display: flex; gap: 14px; flex-wrap: wrap;
  animation: fadeUp 0.8s 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
.btn-lime {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 18px 42px; border-radius: 100px;
  background: var(--accent); color: #ffffff;
  font-weight: 700; font-size: 1.05rem; text-decoration: none;
  box-shadow: 0 0 40px rgba(124,92,252,0.35);
  transition: opacity 0.2s, transform 0.2s;
}
.btn-lime:hover { opacity: 0.9; transform: translateY(-2px); }
.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 18px 32px; border-radius: 100px;
  border: 1px solid var(--border); color: var(--text);
  font-weight: 500; font-size: 1.05rem; text-decoration: none;
  background: rgba(255,255,255,0.03);
  transition: background 0.2s, border-color 0.2s;
}
.btn-outline:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }

/* HERO VISUAL */
.hero-visual {
  position: relative; height: 600px;
  animation: fadeUp 0.9s 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
.chat-card {
  position: absolute; border-radius: 20px; overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
}
.chat-card.main { top: 0; right: 0; width: 340px; }
.chat-card.mini { bottom: 70px; left: 0; width: 265px; }
.card-head {
  padding: 14px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 0.88rem; color: var(--text);
}
.card-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.card-body {
  background: var(--card);
  padding: 18px; display: flex; flex-direction: column; gap: 12px;
}
.msg { padding: 10px 14px; border-radius: 12px; font-size: 0.86rem; line-height: 1.6; max-width: 92%; }
.msg-u  { background: rgba(124,92,252,0.18); border: 1px solid rgba(124,92,252,0.25); align-self: flex-end; color: var(--text); }
.msg-ai { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; color: var(--text); }
.msg-ai strong { color: var(--accent); }
.typing-row {
  display: flex; align-items: center; gap: 5px;
  padding: 10px 14px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--border);
  align-self: flex-start; width: fit-content;
}
.typing-row span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted2); animation: blink 1.4s infinite;
}
.typing-row span:nth-child(2) { animation-delay: 0.2s; }
.typing-row span:nth-child(3) { animation-delay: 0.4s; }

.float-tag {
  position: absolute;
  background: var(--card); border: 1px solid var(--border);
  font-weight: 600; font-size: 0.82rem;
  padding: 9px 16px; border-radius: 100px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.ft-green { background: rgba(124,92,252,0.1); border-color: rgba(124,92,252,0.25); color: var(--accent); }
.ft-blue  { background: rgba(0,229,255,0.1);  border-color: rgba(0,229,255,0.25);  color: var(--accent2); }
.ft-coral { background: rgba(0,229,255,0.1);  border-color: rgba(0,229,255,0.25);  color: var(--accent2); }
.pos-1 { top: 205px; left: 10px;  animation: float 3s   ease-in-out infinite; }
.pos-2 { top: -18px; right: 50px; animation: float 3.6s 0.4s ease-in-out infinite; }
.pos-3 { bottom: 40px; right: 10px; animation: float 2.9s 0.8s ease-in-out infinite; }

/* TICKER */
.ticker {
  overflow: hidden; white-space: nowrap;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 15px 0; position: relative; z-index: 1;
  background: var(--surface);
}
.ticker-track { display: inline-flex; animation: marquee 24s linear infinite; }
.ticker-item {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 0 28px; font-size: 0.86rem; font-weight: 500;
  letter-spacing: 0.04em; color: var(--muted2);
}
.tsep { color: var(--accent); font-size: 0.65rem; }

/* FEATURES */
.features {
  position: relative; z-index: 1;
  max-width: 1280px; margin: 0 auto; padding: 110px 56px;
}
@media(max-width:640px){ .features { padding: 70px 20px; } }

.eyebrow {
  font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--accent); font-weight: 600; margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px;
}
.eyebrow::before { content: ''; width: 30px; height: 1px; background: var(--accent); }
.sec-h2 {
  font-weight: 800;
  font-size: clamp(2.6rem, 5vw, 4.2rem); letter-spacing: -0.04em;
  line-height: 1.05; margin-bottom: 18px; color: var(--text);
}
.sec-h2 em { font-style: italic; color: var(--accent); }
.feat-header {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 48px; align-items: end; margin-bottom: 64px;
}
@media(max-width:768px){ .feat-header { grid-template-columns: 1fr; gap: 20px; } }
.feat-right { color: var(--muted2); font-size: 1.1rem; line-height: 1.85; font-weight: 300; }

.feat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.fc-hero   { grid-column: span 2; }
.fc-finale { grid-column: span 3; }
@media(max-width:900px){
  .feat-grid { grid-template-columns: 1fr 1fr; }
  .fc-hero   { grid-column: span 2; }
  .fc-finale { grid-column: span 2; }
}
@media(max-width:560px){
  .feat-grid { grid-template-columns: 1fr; }
  .fc-hero, .fc-finale { grid-column: span 1; }
}
.feat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 22px; padding: 32px;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), border-color 0.3s, box-shadow 0.3s;
  position: relative; overflow: hidden;
}
.feat-card:hover {
  transform: translateY(-6px);
  border-color: rgba(124,92,252,0.3);
  box-shadow: 0 24px 60px rgba(124,92,252,0.1);
}
.feat-card::after {
  content: ''; position: absolute; inset: 0; opacity: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(124,92,252,0.06), transparent 70%);
  transition: opacity 0.3s;
}
.feat-card:hover::after { opacity: 1; }

.fc-finale-inner { display: flex; gap: 40px; align-items: center; }
@media(max-width:560px){ .fc-finale-inner { flex-direction: column; gap: 20px; } }
.fc-finale-text { flex: 1; }
.fc-finale-pills { display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
.fc-pill {
  padding: 10px 20px; border-radius: 100px;
  background: rgba(124,92,252,0.08); border: 1px solid rgba(124,92,252,0.15);
  font-size: 0.85rem; font-weight: 600; color: var(--accent); white-space: nowrap;
}
.feat-num   { font-size: 0.72rem; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 24px; }
.feat-icon  { font-size: 2.4rem; display: block; margin-bottom: 18px; }
.feat-title { font-weight: 800; font-size: 1.25rem; margin-bottom: 12px; line-height: 1.2; color: var(--text); }
.feat-desc  { color: var(--muted2); font-size: 0.94rem; line-height: 1.75; font-weight: 300; }
.feat-bg    { position: absolute; bottom: -20px; right: -10px; font-size: 7rem; opacity: 0.04; pointer-events: none; line-height: 1; }

/* ABOUT */
.about {
  position: relative; z-index: 1;
  background: var(--surface);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 100px 56px; overflow: hidden;
}
@media(max-width:640px){ .about { padding: 70px 20px; } }
.about::after {
  content: 'AXON';
  position: absolute; bottom: -60px; right: -20px;
  font-weight: 800; font-size: 18vw;
  color: rgba(255,255,255,0.025); white-space: nowrap; pointer-events: none; line-height: 1;
}
.about-inner {
  max-width: 1280px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
}
@media(max-width:900px){ .about-inner { grid-template-columns: 1fr; gap: 48px; } }
.about-desc { color: var(--muted2); font-size: 1.12rem; line-height: 1.85; font-weight: 300; margin-top: 20px; }

.student-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 26px; padding: 40px;
  position: relative; overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.3);
}
.student-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.student-avatar {
  width: 72px; height: 72px; border-radius: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 1.7rem; color: #ffffff; margin-bottom: 26px;
}
.student-name { font-weight: 800; font-size: 1.8rem; letter-spacing: -0.03em; margin-bottom: 22px; color: var(--text); }
.student-rows { display: flex; flex-direction: column; gap: 12px; }
.student-row  { display: flex; align-items: baseline; gap: 12px; font-size: 0.98rem; }
.row-label { color: var(--muted); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; min-width: 58px; }
.row-val   { color: var(--text); font-weight: 400; }
.row-val strong { color: var(--accent); font-weight: 600; }

/* HOW */
.how {
  position: relative; z-index: 1;
  max-width: 1280px; margin: 0 auto; padding: 110px 56px;
}
@media(max-width:640px){ .how { padding: 70px 20px; } }
.steps { margin-top: 64px; }
.step {
  display: grid; grid-template-columns: 90px 1fr; gap: 36px; align-items: start;
  padding: 42px 0; border-bottom: 1px solid var(--border);
}
.step:last-child { border-bottom: none; }
@media(max-width:640px){ .step { grid-template-columns: 1fr; gap: 16px; padding: 30px 0; } }
.step-num   { font-weight: 800; font-size: 4.5rem; color: rgba(255,255,255,0.05); line-height: 1; }
.step-title { font-weight: 800; font-size: 1.4rem; margin-bottom: 12px; color: var(--text); }
.step-desc  { color: var(--muted2); font-size: 1rem; line-height: 1.8; font-weight: 300; }

/* CTA */
.cta-block {
  position: relative; z-index: 1;
  background: linear-gradient(135deg, #7c5cfc, #5b3fd4); color: #ffffff;
  padding: 110px 56px; text-align: center; overflow: hidden;
}
@media(max-width:640px){ .cta-block { padding: 80px 20px; } }
.cta-block::before { content: ''; position: absolute; width: 700px; height: 700px; border-radius: 50%; background: rgba(0,0,0,0.05); top: -300px; left: -200px; }
.cta-block::after  { content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%; background: rgba(0,0,0,0.04); bottom: -200px; right: -100px; }
.cta-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
.cta-h2 {
  font-weight: 800;
  font-size: clamp(2.8rem, 6vw, 5rem); letter-spacing: -0.045em;
  line-height: 1.0; margin-bottom: 22px; color: #ffffff;
}
.cta-sub { font-size: 1.18rem; line-height: 1.8; margin-bottom: 48px; font-weight: 300; color: rgba(255,255,255,0.75); }
.btn-dark {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 20px 50px; border-radius: 100px;
  background: #ffffff; color: #7c5cfc;
  font-weight: 700; font-size: 1.1rem; text-decoration: none;
  box-shadow: 0 16px 40px rgba(0,0,0,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-dark:hover { transform: translateY(-3px); box-shadow: 0 24px 56px rgba(0,0,0,0.35); }
.btn-arr { display: inline-block; transition: transform 0.25s; }
.btn-dark:hover .btn-arr { transform: translateX(5px); }

/* FOOTER */
<footer>
  <div class="footer-logo">
    <div class="footer-logo-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#080b12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    Axon AI
  </div>
  <div>Võ Minh Quân · 8A11 · THCS Nguyễn Bỉnh Khiêm</div>
  <div>© 2026 Axon AI</div>
</footer>

<script>
// Custom cursor
const cur = document.getElementById('cursor');
const fol = document.getElementById('cursorFollower');
let mx=0,my=0,fx=0,fy=0;
document.addEventListener('mousemove',e=>{ mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'; });
(function anim(){ fx+=(mx-fx)*0.13;fy+=(my-fy)*0.13;fol.style.left=fx+'px';fol.style.top=fy+'px';requestAnimationFrame(anim); })();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ cur.style.transform='translate(-50%,-50%) scale(2.5)';fol.style.transform='translate(-50%,-50%) scale(1.5)'; });
  el.addEventListener('mouseleave',()=>{ cur.style.transform='translate(-50%,-50%) scale(1)';fol.style.transform='translate(-50%,-50%) scale(1)'; });
});

// Scroll reveal
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
},{threshold:0.08});
document.querySelectorAll('.sr').forEach(el=>io.observe(el));

// Chat animation
const chatBody = document.getElementById('mainChatBody');
const typingEl = document.getElementById('typingEl');
let replyEl = null, timer = null;
function showReply(){
  typingEl.style.display = 'none';
  replyEl = document.createElement('div');

function removeReply(){
  if(replyEl){ replyEl.remove(); replyEl=null; }

}
timer = setTimeout(showReply, 2000);
