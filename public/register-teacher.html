<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Axon AI — Tài khoản Giáo viên</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a09;--surface:#0a1412;--surface2:#101e1b;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#0d9488;--accent2:#22d3ee;--accent-soft:rgba(13,148,136,.15);
  --text:#e8e8f0;--muted:#6b6b80;--muted2:#9090a8;
  --success:#34d399
}
html,body{min-height:100%;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;overflow-y:auto
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4
}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,#0d9488,transparent);opacity:.1;top:-150px;left:-150px;animation:orb1 22s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,#22d3ee,transparent);opacity:.07;bottom:-120px;right:-100px;animation:orb2 28s ease-in-out infinite}
.bg-orb-3{width:350px;height:350px;background:radial-gradient(circle,#0891b2,transparent);opacity:.05;top:45%;left:45%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,100px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,-70px)}}
@keyframes orb3{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

.card{
  position:relative;z-index:10;
  background:var(--surface);
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px;padding:40px 36px;
  width:100%;max-width:460px;
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px rgba(13,148,136,.07);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.logo{
  display:flex;align-items:center;gap:10px;margin-bottom:28px;
  justify-content:center;font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;font-size:1.25rem;letter-spacing:-.03em;color:white
}
.logo-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;flex-shrink:0;
  box-shadow:0 4px 20px rgba(13,148,136,.45)
}
.logo-icon::after{
  content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);
  animation:logoShimmer 4s ease-in-out infinite
}
@keyframes logoShimmer{0%{left:-60%}40%,100%{left:130%}}

/* Badge giáo viên */
.teacher-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(13,148,136,.15);border:1px solid rgba(13,148,136,.35);
  border-radius:30px;padding:5px 14px;font-size:.75rem;font-weight:700;
  color:var(--accent2);letter-spacing:.04em;text-transform:uppercase;
  margin:0 auto 16px;width:fit-content;display:flex
}

.heading{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:1.5rem;letter-spacing:-.03em;color:white;
  text-align:center;margin-bottom:6px;line-height:1.2
}
.sub{font-size:.83rem;color:var(--muted);text-align:center;margin-bottom:22px;line-height:1.6}

.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field label{font-size:.79rem;font-weight:600;color:var(--muted2);letter-spacing:.01em}
.input-wrap{position:relative}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.s-input{
  background:var(--surface2);border:1px solid var(--border2);border-radius:11px;
  padding:12px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%
}
.s-input:focus{border-color:rgba(13,148,136,.6);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.s-input::placeholder{color:var(--muted)}
.s-input.optional{border-color:rgba(255,255,255,.07)}
.pw-input{padding-right:44px}

.field-opt-label{font-size:.79rem;font-weight:600;color:var(--muted2)}
.field-opt-label span{color:var(--muted);font-weight:400;font-size:.72rem}

.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;background:none;border:none;cursor:pointer;
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:color .15s;border-radius:6px;padding:0;flex-shrink:0
}
.pw-toggle:hover{color:var(--muted2)}

.pw-strength{height:3px;border-radius:4px;background:var(--border2);margin-top:6px;overflow:hidden}
.pw-strength-bar{height:100%;border-radius:4px;width:0;transition:width .3s,background .3s}
.pw-strength-label{font-size:.7rem;color:var(--muted);margin-top:4px}

/* ReactBits-inspired Fade Content reveal for confirm password */
.confirm-field{
  opacity:0;
  max-height:0;
  overflow:hidden;
  transform:translateY(16px) scale(.97);
  filter:blur(8px);
  pointer-events:none;
  transition:max-height .45s cubic-bezier(.22,1,.36,1),opacity .28s ease,transform .45s cubic-bezier(.22,1,.36,1),filter .45s ease;
}
.confirm-field .input-wrap{width:100%}
.confirm-field.is-visible{
  opacity:1;
  max-height:160px;
  transform:translateY(0) scale(1);
  filter:blur(0);
  pointer-events:auto;
  animation:rbFadeContent .48s cubic-bezier(.22,1,.36,1);
}
@keyframes rbFadeContent{
  0%{opacity:0;transform:translateY(18px) scale(.96);filter:blur(10px)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-6px)}30%{transform:translateX(6px)}
  45%{transform:translateX(-4px)}60%{transform:translateX(4px)}
  75%{transform:translateX(-2px)}90%{transform:translateX(2px)}
}
.field.shake .s-input{
  animation:shake .45s cubic-bezier(.36,.07,.19,.97) both;
  border-color:rgba(248,113,113,.5)!important;box-shadow:0 0 0 3px rgba(248,113,113,.08)!important
}

.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#0d9488,#22d3ee);
  border:none;border-radius:11px;color:white;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;
  margin-top:6px;position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(13,148,136,.35)
}
.btn-primary:hover:not(:disabled){opacity:.92;transform:translateY(-1px);box-shadow:0 8px 28px rgba(13,148,136,.45)}
.btn-primary:active:not(:disabled){transform:translateY(0) scale(.99)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-primary::after{
  content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  animation:btnShimmer 3s ease-in-out infinite
}
@keyframes btnShimmer{0%{left:-80%}40%,100%{left:120%}}

.btn-spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:white;
  border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:7px
}
@keyframes spin{to{transform:rotate(360deg)}}

.msg{font-size:.8rem;padding:10px 13px;border-radius:9px;margin-top:12px;display:none;align-items:center;gap:8px;line-height:1.5}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5;display:flex}
.msg.ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success);display:flex}

.divider{height:1px;background:var(--border);margin:20px 0}
.footer-txt{font-size:.74rem;color:var(--muted);text-align:center;line-height:1.8}
.footer-txt a{color:var(--accent2);text-decoration:none;font-weight:600}
.footer-txt a:hover{text-decoration:underline}

@media(max-width:480px){
  .card{padding:28px 22px;border-radius:20px;margin:8px}
  .heading{font-size:1.3rem}
  .row2{grid-template-columns:1fr}
  body{padding:12px}
}
@media(max-width:400px){.card{padding:24px 16px}.heading{font-size:1.15rem}}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    Axon AI
  </div>

  <div class="teacher-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
    Dành cho Giáo viên
  </div>

  <!-- ── Đăng ký ── -->
    <div class="heading">Tạo tài khoản Giáo viên</div>
    <div class="sub">Miễn phí · Hỗ trợ soạn bài &amp; quản lý lớp</div>

    <form onsubmit="doRegister(event)" autocomplete="on" novalidate>
      <div class="field" id="rf-name">
        <label for="r-name">Họ và tên <span style="color:#f87171">*</span></label>
        <input class="s-input" type="text" id="r-name" placeholder="Nguyễn Văn A" required autocomplete="name">
      </div>

      <div class="field" id="rf-email">
        <label for="r-email">Email <span style="color:#f87171">*</span></label>
        <input class="s-input" type="email" id="r-email" placeholder="giaovien@gmail.com" required autocomplete="email">
      </div>

      <div class="row2">
        <div class="field">
          <label class="field-opt-label" for="r-subject">Môn dạy <span>(tuỳ chọn)</span></label>
          <input class="s-input optional" type="text" id="r-subject" placeholder="Toán, Lý…">
        </div>
        <div class="field">
          <label class="field-opt-label" for="r-school">Trường <span>(tuỳ chọn)</span></label>
          <input class="s-input optional" type="text" id="r-school" placeholder="THPT…">
        </div>
      </div>

      <div class="field" id="rf-pw">
        <label for="r-pw">Mật khẩu <span style="color:#f87171">*</span></label>
        <div class="input-wrap">
          <input class="s-input pw-input" type="password" id="r-pw"
            placeholder="Tối thiểu 8 ký tự" required autocomplete="new-password"
            oninput="checkStrength(this.value);revealConfirm(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('r-pw','r-eye')" aria-label="Hiện mật khẩu">
            <svg id="r-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="strength-bar"></div></div>
        <div class="pw-strength-label" id="strength-label"></div>
      </div>

      <div class="field confirm-field" id="rf-pw2">
        <label for="r-pw2">Xác nhận mật khẩu <span style="color:#f87171">*</span></label>
        <div class="input-wrap">
          <input class="s-input pw-input" type="password" id="r-pw2"
            placeholder="Nhập lại mật khẩu" required autocomplete="new-password" disabled>
          <button type="button" class="pw-toggle" onclick="togglePw('r-pw2','r-eye2')" aria-label="Hiện mật khẩu">
            <svg id="r-eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="msg" id="r-msg"></div>
      <button class="btn-primary" type="submit" id="r-btn">Tạo tài khoản Giáo viên</button>
    </form>

  <div class="divider"></div>
  <div class="footer-txt">
    Đã có tài khoản? <a href="/login-email-teacher.html">Đăng nhập ↗</a>
  </div>
</div>

<script>
(async () => {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) { const d = await r.json(); location.href = d.role === 'admin' ? '/admin.html' : '/chat.html'; }
  } catch {}
})();

const _pw = {};
function togglePw(inputId, iconId) {
  _pw[inputId] = !_pw[inputId];
  document.getElementById(inputId).type = _pw[inputId] ? 'text' : 'password';
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById(iconId);
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (_pw[inputId]) {
    const p = document.createElementNS(NS,'path');
    p.setAttribute('d','M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24');
    const l = document.createElementNS(NS,'line');
    l.setAttribute('x1','1');l.setAttribute('y1','1');l.setAttribute('x2','23');l.setAttribute('y2','23');
    svg.appendChild(p);svg.appendChild(l);
  } else {
    const p = document.createElementNS(NS,'path');
    p.setAttribute('d','M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z');
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx','12');c.setAttribute('cy','12');c.setAttribute('r','3');
    svg.appendChild(p);svg.appendChild(c);
  }
}

function revealConfirm(pw) {
  const field = document.getElementById('rf-pw2');
  const input = document.getElementById('r-pw2');
  const shouldShow = pw.length >= 8;
  field.classList.toggle('is-visible', shouldShow);
  input.disabled = !shouldShow;
  if (!shouldShow) input.value = '';
}

function checkStrength(pw) {
  const bar = document.getElementById('strength-bar');
  const lbl = document.getElementById('strength-label');
  if (!pw) { bar.style.width='0'; lbl.textContent=''; return; }
  let score = 0;
  if (pw.length >= 8)          score++;
  if (/[a-z]/.test(pw))        score++;
  if (/[A-Z]/.test(pw))        score++;
  if (/\d/.test(pw))           score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w:'20%', c:'#f87171', t:'Rất yếu — cần chữ hoa, chữ thường, số, ký tự đặc biệt' },
    { w:'40%', c:'#fb923c', t:'Yếu' },
    { w:'60%', c:'#facc15', t:'Trung bình' },
    { w:'80%', c:'#4ade80', t:'Tốt' },
    { w:'100%',c:'#34d399', t:'Mạnh ✓' },
  ];
  const lvl = levels[Math.min(score - 1, 4)] || levels[0];
  bar.style.width = lvl.w; bar.style.background = lvl.c;
  lbl.style.color = lvl.c; lbl.textContent = lvl.t;
}

function shake(id) {
  const f=document.getElementById(id);
  f.classList.remove('shake'); void f.offsetWidth; f.classList.add('shake');
  setTimeout(()=>f.classList.remove('shake'),500);
}

function toTitleCaseWord(word) {
  return word
    .split(/([\-'])/u)
    .map(part => {
      if (!part || part === '-' || part === "'") return part;
      return part.charAt(0).toLocaleUpperCase('vi-VN') + part.slice(1).toLocaleLowerCase('vi-VN');
    })
    .join('');
}

function normalizeFullNameInput(name) {
  const normalized = String(name ?? '').trim().replace(/\s+/g, ' ');
  if (!normalized) return '';
  return normalized.split(' ').map(toTitleCaseWord).join(' ');
}

function validateFullName(name) {
  if (!name) return 'Vui lòng nhập họ tên';
  const parts = name.split(/\s+/).filter(Boolean);
  if (parts.length < 2) return 'Họ tên phải có ít nhất 2 từ (ví dụ: Nguyễn Văn A)';
  if (parts.some(w => w.length < 2)) return 'Mỗi từ trong họ tên phải có ít nhất 2 ký tự';
  if (name.replace(/\s/g, '').length < 6) return 'Họ tên quá ngắn';
  if (!/^[\p{L}\s\-'.]+$/u.test(name)) return 'Họ tên không được chứa số hoặc ký tự đặc biệt';
  if (/(.)\1{2,}/u.test(name.replace(/\s/g, ''))) return 'Họ tên không hợp lệ (chứa ký tự lặp bất thường)';
  const vowelRe = /[aăâeêioôơuưyàáảãạăắằẳẵặâấầẩẫậèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵAĂÂEÊIOÔƠUƯYÀÁẢÃẠĂẮẰẲẴẶÂẤẦẨẪẬÈÉẺẼẸÊẾỀỂỄỆÌÍỈĨỊÒÓỎÕỌÔỐỒỔỖỘƠỚỜỞỠỢÙÚỦŨỤƯỨỪỬỮỰỲÝỶỸỴ]/;
  if (parts.some(w => !vowelRe.test(w))) return 'Họ tên không hợp lệ (mỗi từ phải có nguyên âm)';
  return null;
}

async function doRegister(e) {
  e.preventDefault();
  const btn=document.getElementById('r-btn');
  const msg=document.getElementById('r-msg');
  const fullName=normalizeFullNameInput(document.getElementById('r-name').value);
  const email=document.getElementById('r-email').value.trim();
  const pw=document.getElementById('r-pw').value;
  const pw2=document.getElementById('r-pw2').value;
  const subject=document.getElementById('r-subject').value.trim();
  const school=document.getElementById('r-school').value.trim();
  document.getElementById('r-name').value = fullName;

  msg.className='msg';
  const nameErr = validateFullName(fullName);
  if(nameErr){shake('rf-name');msg.textContent='⚠ ' + nameErr;msg.className='msg err';return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){shake('rf-email');msg.textContent='⚠ Email không hợp lệ';msg.className='msg err';return;}
  if(pw.length<8){shake('rf-pw');msg.textContent='⚠ Mật khẩu tối thiểu 8 ký tự';msg.className='msg err';return;}
  if(!/[a-z]/.test(pw)){shake('rf-pw');msg.textContent='⚠ Mật khẩu phải có ít nhất 1 chữ thường';msg.className='msg err';return;}
  if(!/[A-Z]/.test(pw)){shake('rf-pw');msg.textContent='⚠ Mật khẩu phải có ít nhất 1 chữ hoa';msg.className='msg err';return;}
  if(!/\d/.test(pw)){shake('rf-pw');msg.textContent='⚠ Mật khẩu phải có ít nhất 1 chữ số';msg.className='msg err';return;}
  if(!/[^A-Za-z0-9]/.test(pw)){shake('rf-pw');msg.textContent='⚠ Mật khẩu phải có ít nhất 1 ký tự đặc biệt';msg.className='msg err';return;}
  if(pw!==pw2){shake('rf-pw2');msg.textContent='⚠ Mật khẩu xác nhận không khớp';msg.className='msg err';return;}

  btn.disabled=true;
  btn.innerHTML='<span class="btn-spinner"></span>Đang tạo tài khoản…';

  try {
    const res=await fetch('/api/auth/register-teacher',{
      method:'POST',credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fullName,email,password:pw,subject,school})
    });
    const data=await res.json();
    if(!res.ok){
      msg.textContent='⚠ '+(data.error||'Đăng ký thất bại');
      msg.className='msg err';
      btn.disabled=false;btn.textContent='Tạo tài khoản Giáo viên';return;
    }
    localStorage.setItem('hc_role',data.role);
    localStorage.setItem('hc_fullName',data.fullName);
    localStorage.setItem('hc_className','');
    localStorage.setItem('hc_gender','');
    localStorage.setItem('hc_dob','');
    localStorage.setItem('hc_mustChangePw','0');
    msg.textContent='✓ Tài khoản đã tạo! Đang vào ứng dụng…';
    msg.className='msg ok';
    setTimeout(()=>{location.href='/chat.html';},700);
  } catch {
    msg.textContent='⚠ Lỗi kết nối. Vui lòng thử lại.';
    msg.className='msg err';
    btn.disabled=false;btn.textContent='Tạo tài khoản Giáo viên';
  }
}
</script>
