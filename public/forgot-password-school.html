<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Axon AI — Quên mật khẩu (Tài khoản trường)</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--surface:#0d0d14;--surface2:#12121e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#7c5cfc;--accent2:#00e5ff;--accent-soft:rgba(124,92,252,.15);
  --text:#e8e8f0;--muted:#6b6b80;--muted2:#9090a8;
  --danger:#f87171;--success:#34d399
}
html,body{min-height:100%;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-feature-settings:'calt','kern','liga';
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;overflow-y:auto
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4
}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,#7c5cfc,transparent);opacity:.07;top:-150px;left:-150px;animation:orb1 22s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,#00e5ff,transparent);opacity:.06;bottom:-120px;right:-100px;animation:orb2 28s ease-in-out infinite}
.bg-orb-3{width:350px;height:350px;background:radial-gradient(circle,#9c5cfc,transparent);opacity:.04;top:45%;left:45%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,100px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,-70px)}}
@keyframes orb3{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

.card{
  position:relative;z-index:10;
  background:var(--surface);
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px;padding:40px 36px;
  width:100%;max-width:440px;
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px rgba(124,92,252,.05);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:-.03em;color:white}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:11px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 4px 20px rgba(124,92,252,.4)}
.logo-icon::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);animation:logoShimmer 4s ease-in-out infinite}
@keyframes logoShimmer{0%{left:-60%}40%,100%{left:130%}}
.heading{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.65rem;letter-spacing:-.03em;color:white;text-align:center;margin-bottom:6px;line-height:1.2}
.sub{font-size:.82rem;color:var(--muted2);text-align:center;margin-bottom:28px;line-height:1.6}

/* Step indicator */
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:24px}
.step{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--muted);transition:all .3s}
.step.active{background:var(--accent);border-color:var(--accent);color:white;box-shadow:0 0 12px rgba(124,92,252,.4)}
.step.done{background:rgba(52,211,153,.15);border-color:#34d399;color:#34d399}
.step-line{flex:1;max-width:40px;height:1px;background:var(--border2);transition:background .3s}
.step-line.done{background:#34d399}

.field{margin-bottom:18px}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.input-wrap{position:relative}
.s-input{
  width:100%;padding:11px 14px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:11px;color:var(--text);font-size:.88rem;
  font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s
}
.s-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.15)}
.s-input::placeholder{color:var(--muted)}
.pw-input{padding-right:44px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:4px;
  color:var(--muted);display:flex;align-items:center;justify-content:center
}
.pw-toggle:hover{color:var(--muted2)}

/* OTP input */
.otp-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:6px}
.otp-digit{
  width:46px;height:54px;
  background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:10px;color:var(--text);font-size:1.4rem;font-weight:700;
  text-align:center;font-family:inherit;outline:none;
  transition:border-color .2s,box-shadow .2s;caret-color:var(--accent)
}
.otp-digit:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.15)}

.resend-row{text-align:center;margin-top:10px;font-size:.77rem;color:var(--muted)}
.resend-btn{background:none;border:none;color:var(--accent2);font-size:.77rem;font-weight:600;cursor:pointer;padding:0;font-family:inherit}
.resend-btn:disabled{color:var(--muted);cursor:default}
.resend-timer{color:var(--muted2)}

.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent),#9c5cfc);
  border:none;border-radius:12px;
  color:white;font-size:.9rem;font-weight:700;
  font-family:inherit;cursor:pointer;
  position:relative;overflow:hidden;
  transition:opacity .2s,transform .15s;
  margin-top:4px
}
.btn-primary:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-primary::after{
  content:'';position:absolute;top:0;left:-80%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  animation:btnShimmer 3s ease-in-out infinite
}
@keyframes btnShimmer{0%{left:-80%}40%,100%{left:120%}}
.btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}

.msg{font-size:.8rem;padding:10px 13px;border-radius:9px;margin-top:12px;display:none;align-items:center;gap:8px;line-height:1.5}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5;display:flex}
.msg.ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success);display:flex}

.divider{height:1px;background:var(--border);margin:20px 0}
.footer-txt{font-size:.74rem;color:var(--muted);text-align:center;line-height:1.9}
.footer-txt a{color:var(--accent2);text-decoration:none;font-weight:600}
.footer-txt a:hover{text-decoration:underline}

.panel{display:none}
.panel.active{display:block}

@media(max-width:480px){.card{padding:28px 22px;border-radius:20px;margin:8px}.heading{font-size:1.35rem}.logo{margin-bottom:20px}body{padding:12px}.otp-digit{width:38px;height:48px;font-size:1.2rem}}
@media(max-width:360px){.card{padding:22px 16px}.heading{font-size:1.2rem}.otp-digit{width:34px;height:44px;font-size:1.1rem}}
html{overflow-x:hidden}body{overflow-wrap:break-word}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    Axon AI
  </div>

  <!-- Step indicator -->
  <div class="steps">
    <div class="step active" id="step1-dot">1</div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="step2-dot">2</div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3-dot">3</div>
  </div>

  <!-- Step 1: CCCD + recovery email -->
  <div class="panel active" id="panel-1">
    <div class="heading">Quên mật khẩu</div>
    <div class="sub">Nhập CCCD và email khôi phục đã đăng ký với tài khoản trường</div>
    <form onsubmit="doStep1(event)" autocomplete="off" novalidate>
      <div class="field">
        <label for="cccd">CCCD / Mã học sinh</label>
        <div class="input-wrap">
          <input class="s-input" type="text" id="cccd" name="cccd"
            placeholder="Nhập CCCD hoặc mã đăng nhập" required>
        </div>
      </div>
      <div class="field">
        <label for="recovery-email">Email khôi phục</label>
        <div class="input-wrap">
          <input class="s-input" type="email" id="recovery-email" name="email"
            placeholder="Email đã đăng ký để khôi phục" required autocomplete="email">
        </div>
      </div>
      <div class="msg" id="msg1"></div>
      <button class="btn-primary" type="submit" id="btn1">Gửi mã xác minh</button>
    </form>
  </div>

  <!-- Step 2: OTP -->
  <div class="panel" id="panel-2">
    <div class="heading">Nhập mã OTP</div>
    <div class="sub" id="otp-sub">Mã 6 chữ số đã gửi tới email của bạn</div>
    <form onsubmit="doStep2(event)" autocomplete="off" novalidate>
      <div class="otp-wrap" id="otp-wrap">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off">
      </div>
      <div class="resend-row">
        <button type="button" class="resend-btn" id="resend-btn" onclick="doResend()" disabled>Gửi lại mã</button>
        <span class="resend-timer" id="resend-timer"></span>
      </div>
      <div class="msg" id="msg2"></div>
      <button class="btn-primary" type="submit" id="btn2">Xác nhận mã OTP</button>
    </form>
  </div>

  <!-- Step 3: New password -->
  <div class="panel" id="panel-3">
    <div class="heading">Mật khẩu mới</div>
    <div class="sub">Đặt mật khẩu mới cho tài khoản của bạn</div>
    <form onsubmit="doStep3(event)" autocomplete="off" novalidate>
      <div class="field">
        <label for="pw1">Mật khẩu mới</label>
        <div class="input-wrap">
          <input class="s-input pw-input" type="password" id="pw1"
            placeholder="Ít nhất 8 ký tự" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('pw1','eye1')" aria-label="Hiện mật khẩu">
            <svg id="eye1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="pw2">Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <input class="s-input pw-input" type="password" id="pw2"
            placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('pw2','eye2')" aria-label="Hiện mật khẩu">
            <svg id="eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="msg" id="msg3"></div>
      <button class="btn-primary" type="submit" id="btn3">Đặt lại mật khẩu</button>
    </form>
  </div>

  <div class="divider"></div>
  <div class="footer-txt">
    <a href="/_school.html">← Quay về đăng nhập trường</a>
  </div>
</div>

<script>
let _cccd = '';
let _otp = '';
let _resendTimer = null;

// ── OTP digit input wiring ──────────────────────────────────────────────────
const digits = document.querySelectorAll('.otp-digit');
digits.forEach((d, i) => {
  d.addEventListener('input', e => {
    const v = e.target.value.replace(/\D/g, '');
    e.target.value = v;
    if (v && i < digits.length - 1) digits[i + 1].focus();
  });
  d.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i - 1].focus();
  });
  d.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
    text.split('').forEach((ch, j) => { if (digits[j]) digits[j].value = ch; });
    const next = Math.min(text.length, digits.length - 1);
    digits[next].focus();
  });
});

function getOtpValue() {
  return Array.from(digits).map(d => d.value).join('');
}

function clearOtpInputs() {
  digits.forEach(d => { d.value = ''; });
  digits[0].focus();
}

// ── Step navigation ─────────────────────────────────────────────────────────
function goStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('panel-' + i).classList.toggle('active', i === n);
    const dot = document.getElementById('step' + i + '-dot');
    dot.classList.remove('active','done');
    if (i < n) dot.classList.add('done');
    else if (i === n) dot.classList.add('active');
  });
  document.getElementById('line1').classList.toggle('done', n > 1);
  document.getElementById('line2').classList.toggle('done', n > 2);
}

// ── Resend cooldown ──────────────────────────────────────────────────────────
function startResendCooldown(secs) {
  const btn = document.getElementById('resend-btn');
  const timer = document.getElementById('resend-timer');
  btn.disabled = true;
  let rem = secs;
  timer.textContent = ' (' + rem + 's)';
  clearInterval(_resendTimer);
  _resendTimer = setInterval(() => {
    rem--;
    if (rem <= 0) {
      clearInterval(_resendTimer);
      btn.disabled = false;
      timer.textContent = '';
    } else {
      timer.textContent = ' (' + rem + 's)';
    }
  }, 1000);
}

// ── Error SVG helper ─────────────────────────────────────────────────────────
const ERR_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> ';

// ── Step 1: Request OTP ───────────────────────────────────────────────────────
async function doStep1(e) {
  e.preventDefault();
  const btn = document.getElementById('btn1');
  const msg = document.getElementById('msg1');
  _cccd = document.getElementById('cccd').value.trim();
  const email = document.getElementById('recovery-email').value.trim();

  msg.className = 'msg';
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Đang gửi mã…';

  try {
    const res = await fetch('/api/auth/school/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cccd: _cccd, recoveryEmail: email })
    });
    const data = await res.json();
    if (!res.ok) {
      msg.innerHTML = ERR_ICON + (data.error || 'Gửi mã thất bại').replace(/</g,'&lt;');
      msg.className = 'msg err';
      btn.disabled = false; btn.textContent = 'Gửi mã xác minh'; return;
    }
    const masked = data.maskedEmail || email.replace(/(.{2})(.*)(@.*)/, '$1***$3');
    document.getElementById('otp-sub').textContent = 'Mã 6 chữ số đã gửi tới ' + masked;
    goStep(2);
    startResendCooldown(60);
    clearOtpInputs();
  } catch {
    msg.innerHTML = ERR_ICON + 'Lỗi kết nối. Vui lòng thử lại.';
    msg.className = 'msg err';
    btn.disabled = false; btn.textContent = 'Gửi mã xác minh';
  }
}

// ── Resend OTP ────────────────────────────────────────────────────────────────
async function doResend() {
  const msg = document.getElementById('msg2');
  msg.className = 'msg';
  const email = document.getElementById('recovery-email').value.trim();
  try {
    const res = await fetch('/api/auth/school/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cccd: _cccd, recoveryEmail: email })
    });
    const data = await res.json();
    if (!res.ok) {
      msg.innerHTML = ERR_ICON + (data.error || 'Gửi lại thất bại').replace(/</g,'&lt;');
      msg.className = 'msg err'; return;
    }
    msg.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Đã gửi lại mã.';
    msg.className = 'msg ok';
    startResendCooldown(60);
    clearOtpInputs();
  } catch {
    msg.innerHTML = ERR_ICON + 'Lỗi kết nối.';
    msg.className = 'msg err';
  }
}

// ── Step 2: Verify OTP ────────────────────────────────────────────────────────
async function doStep2(e) {
  e.preventDefault();
  const btn = document.getElementById('btn2');
  const msg = document.getElementById('msg2');
  _otp = getOtpValue();

  if (_otp.length !== 6) {
    msg.innerHTML = ERR_ICON + 'Vui lòng nhập đủ 6 chữ số.';
    msg.className = 'msg err'; return;
  }

  msg.className = 'msg';
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Đang xác minh…';

  // We don't verify OTP separately; just move to step 3.
  // The OTP is verified in step 3 (reset-password) along with new password.
  goStep(3);
  btn.disabled = false; btn.textContent = 'Xác nhận mã OTP';
}

// ── Step 3: Reset password ────────────────────────────────────────────────────
async function doStep3(e) {
  e.preventDefault();
  const btn = document.getElementById('btn3');
  const msg = document.getElementById('msg3');
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;

  msg.className = 'msg';

  if (pw1.length < 8) {
    msg.innerHTML = ERR_ICON + 'Mật khẩu phải có ít nhất 8 ký tự.';
    msg.className = 'msg err'; return;
  }
  if (pw1 !== pw2) {
    msg.innerHTML = ERR_ICON + 'Mật khẩu xác nhận không khớp.';
    msg.className = 'msg err'; return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Đang xử lý…';

  try {
    const res = await fetch('/api/auth/school/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cccd: _cccd, otp: _otp, newPassword: pw1 })
    });
    const data = await res.json();
    if (!res.ok) {
      msg.innerHTML = ERR_ICON + (data.error || 'Đặt lại thất bại').replace(/</g,'&lt;');
      msg.className = 'msg err';
      // If OTP expired, go back to step 2
      if (res.status === 400) {
        btn.disabled = false; btn.textContent = 'Đặt lại mật khẩu'; return;
      }
      btn.disabled = false; btn.textContent = 'Đặt lại mật khẩu'; return;
    }
    msg.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Đặt lại thành công! Đang chuyển đến đăng nhập…';
    msg.className = 'msg ok';
    btn.textContent = '✓ Thành công!';
    goStep(3);
    // mark all done
    ['step1-dot','step2-dot','step3-dot'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('active'); el.classList.add('done');
    });
    setTimeout(() => { location.href = '/_school.html'; }, 2000);
  } catch {
    msg.innerHTML = ERR_ICON + 'Lỗi kết nối. Vui lòng thử lại.';
    msg.className = 'msg err';
    btn.disabled = false; btn.textContent = 'Đặt lại mật khẩu';
  }
}

// ── Password visibility toggle ────────────────────────────────────────────────
const _pw = {};
function togglePw(inputId, iconId) {
  _pw[inputId] = !_pw[inputId];
  document.getElementById(inputId).type = _pw[inputId] ? 'text' : 'password';
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById(iconId);
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (_pw[inputId]) {
    const p = document.createElementNS(NS,'path'); p.setAttribute('d','M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24');
    const l = document.createElementNS(NS,'line'); l.setAttribute('x1','1');l.setAttribute('y1','1');l.setAttribute('x2','23');l.setAttribute('y2','23');
    svg.appendChild(p); svg.appendChild(l);
  } else {
    const p = document.createElementNS(NS,'path'); p.setAttribute('d','M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z');
    const c = document.createElementNS(NS,'circle'); c.setAttribute('cx','12');c.setAttribute('cy','12');c.setAttribute('r','3');
    svg.appendChild(p); svg.appendChild(c);
  }
}
