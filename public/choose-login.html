<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Axon AI — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--surface:#0d0d14;--surface2:#12121e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#7c5cfc;--accent2:#00e5ff;--accent-soft:rgba(124,92,252,.15);
  --text:#e8e8f0;--muted:#6b6b80;--muted2:#9090a8
}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-feature-settings:'calt','kern','liga';
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4
}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,#7c5cfc,transparent);opacity:.07;top:-150px;left:-150px;animation:orb1 22s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,#00e5ff,transparent);opacity:.06;bottom:-120px;right:-100px;animation:orb2 28s ease-in-out infinite}
.bg-orb-3{width:350px;height:350px;background:radial-gradient(circle,#9c5cfc,transparent);opacity:.04;top:45%;left:45%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,100px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,-70px)}}
@keyframes orb3{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

.card{
  position:relative;z-index:10;background:var(--surface);
  border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px 36px;
  width:100%;max-width:440px;
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px rgba(124,92,252,.05);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:-.03em;color:white}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:11px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 4px 20px rgba(124,92,252,.4)}
.logo-icon::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);animation:logoShimmer 4s ease-in-out infinite}
@keyframes logoShimmer{0%{left:-60%}40%,100%{left:130%}}

.heading{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.03em;color:white;text-align:center;margin-bottom:6px;line-height:1.2}
.sub{font-size:.84rem;color:var(--muted);text-align:center;margin-bottom:26px;line-height:1.6}

/* Steps wrapper */
.steps-wrap{position:relative}

.step{transition:opacity .25s,transform .25s}
.step.hidden{display:none}
.step.slide-out{opacity:0;transform:translateX(-18px);pointer-events:none}
.step.slide-in{animation:slideIn .3s cubic-bezier(.22,1,.36,1) both}
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.step.slide-back{animation:slideBack .3s cubic-bezier(.22,1,.36,1) both}
@keyframes slideBack{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}

/* Option cards (step 1) */
.opt-cards{display:flex;flex-direction:column;gap:11px}
.opt-card{
  background:var(--surface2);border:1.5px solid var(--border2);border-radius:16px;
  padding:17px 18px;cursor:pointer;
  transition:border-color .2s,background .2s,transform .15s,box-shadow .2s;
  display:flex;align-items:center;gap:14px;text-align:left;width:100%;
  color:inherit;font-family:'Plus Jakarta Sans',sans-serif;
}
.opt-card:hover{border-color:rgba(124,92,252,.55);background:rgba(124,92,252,.06);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.opt-card-icon{
  width:46px;height:46px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.icon-school{background:rgba(124,92,252,.18);color:rgba(124,92,252,.9)}
.icon-personal{background:rgba(0,229,255,.12);color:rgba(0,229,255,.9)}
.opt-card-body{flex:1;min-width:0}
.opt-card-title{font-weight:700;font-size:.93rem;color:var(--text);margin-bottom:3px}
.opt-card-desc{font-size:.76rem;color:var(--muted);line-height:1.5}
.opt-card-arrow{color:var(--muted);flex-shrink:0;transition:transform .2s,color .2s}
.opt-card:hover .opt-card-arrow{transform:translateX(4px);color:var(--muted2)}

.opt-card-disabled{
  opacity:.45;cursor:not-allowed;
  filter:grayscale(.85);
  border-color:var(--border)!important;
  background:var(--surface2)!important;
  transform:none!important;box-shadow:none!important
}
.opt-card-disabled:hover{
  border-color:var(--border)!important;
  background:var(--surface2)!important;
  transform:none!important;box-shadow:none!important
}
.opt-card-disabled .opt-card-title,.opt-card-disabled .opt-card-desc{color:var(--muted)}
.opt-card-disabled .opt-card-arrow{color:var(--muted);transform:none!important}

@keyframes optShake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-7px)}
  30%{transform:translateX(7px)}
  45%{transform:translateX(-5px)}
  60%{transform:translateX(5px)}
  75%{transform:translateX(-2px)}
  90%{transform:translateX(2px)}
}
.opt-card.shake-locked{animation:optShake .5s cubic-bezier(.36,.07,.19,.97) both}
.opt-card.locked-red{
  border-color:rgba(248,113,113,.75)!important;
  box-shadow:0 0 0 3px rgba(248,113,113,.2),0 0 24px rgba(248,113,113,.15)!important;
  background:rgba(248,113,113,.06)!important
}

.demo-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);
  z-index:10000;max-width:min(420px,calc(100vw - 32px));
  padding:12px 16px;border-radius:12px;
  background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.35);
  color:#fca5a5;font-size:.82rem;line-height:1.55;text-align:center;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  box-shadow:0 8px 32px rgba(0,0,0,.45)
}
.demo-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Role cards (step 2) */
.back-btn{
  display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:.8rem;font-weight:600;
  background:none;border:none;cursor:pointer;padding:0 0 18px;
  font-family:'Plus Jakarta Sans',sans-serif;transition:color .15s
}
.back-btn:hover{color:var(--muted2)}

.role-cards{display:flex;gap:10px;margin-top:2px}
.role-card{
  flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:16px;
  padding:22px 14px 18px;cursor:pointer;
  transition:border-color .2s,background .2s,transform .15s,box-shadow .2s;
  display:flex;flex-direction:column;align-items:center;gap:9px;
  font-family:'Plus Jakarta Sans',sans-serif;color:inherit
}
.role-card:hover{border-color:rgba(124,92,252,.55);background:rgba(124,92,252,.06);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.role-icon{display:flex;align-items:center;justify-content:center}
.role-title{font-weight:700;font-size:.9rem;color:var(--text)}
.role-sub{font-size:.73rem;color:var(--muted);text-align:center;line-height:1.4}

.divider{height:1px;background:var(--border);margin:24px 0}
.footer-txt{font-size:.74rem;color:var(--muted);text-align:center;line-height:1.8}
.footer-txt a{color:var(--accent2);text-decoration:none;font-weight:600}
.footer-txt a:hover{text-decoration:underline}

@media(max-width:480px){
  .card{padding:28px 20px;border-radius:20px;margin:8px}
  .heading{font-size:1.35rem}.logo{margin-bottom:20px}
  body{padding:12px}.role-card{padding:18px 10px 14px}
}
@media(max-width:400px){.card{padding:24px 16px}.heading{font-size:1.2rem}}
@media(max-width:360px){.card{padding:22px 14px}}
html{overflow-x:hidden}
body{overflow-wrap:break-word}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    Axon AI
  </div>

  <div class="steps-wrap">

    <!-- ── Step 1: Chọn loại tài khoản ── -->
    <div id="step1" class="step">
      <div class="heading">Xin chào</div>
      <div class="sub">Chọn loại tài khoản để tiếp tục</div>
      <div class="opt-cards">
        <button class="opt-card" onclick="pickType('school')">
          <div class="opt-card-icon icon-school">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 22V12H10v10"/><path d="m18 10 4 2v10H2V12l4-2"/><path d="m4 6 8-4 8 4"/></svg>
          </div>
          <div class="opt-card-body">
            <div class="opt-card-title">Tài khoản Trường</div>
            <div class="opt-card-desc">Đăng nhập bằng số CCCD — dành cho học sinh &amp; giáo viên trong hệ thống nhà trường</div>
          </div>
          <svg class="opt-card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button type="button" class="opt-card opt-card-disabled" id="opt-personal" onclick="pickTypeLocked(event)">
          <div class="opt-card-icon icon-personal">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          </div>
          <div class="opt-card-body">
            <div class="opt-card-title">Tài khoản Cá nhân</div>
            <div class="opt-card-desc">Đăng nhập bằng email — dành cho tài khoản tự đăng ký bên ngoài</div>
          </div>
          <svg class="opt-card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <!-- ── Step 2: Chọn vai trò ── -->
    <div id="step2" class="step hidden">
      <button class="back-btn" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Quay lại
      </button>
      <div class="heading">Bạn là...</div>
      <div class="sub" id="step2-sub">Chọn vai trò của bạn</div>
      <div class="role-cards">
        <button class="role-card" onclick="goLogin('student')">
          <div class="role-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          </div>
          <div class="role-title">Học sinh</div>
          <div class="role-sub">Tài khoản học tập</div>
        </button>
        <button class="role-card" onclick="goLogin('teacher')">
          <div class="role-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
          </div>
          <div class="role-title">Giáo viên</div>
          <div class="role-sub">Tài khoản giảng dạy</div>
        </button>
      </div>
    </div>

  </div><!-- /steps-wrap -->

</div>

<div class="demo-toast" id="demo-toast" role="alert" aria-live="polite"></div>

<script>
(async () => {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) { 
      const d = await r.json(); 
      location.href = d.role === 'admin' ? '/admin.html' : d.role === 'teacher' ? '/teacher.html' : '/chat.html'; 
    }
  } catch {}
})();

let _type = null;
let _demoToastTimer = null;

const DEMO_PERSONAL_MSG = 'Bản Demo chưa phát triển tính năng tài khoản cá nhân, vui lòng sử dụng tài khoản của trường.';

function showDemoToast(message) {
  const el = document.getElementById('demo-toast');
  if (!el) return;
  el.textContent = message;
  el.classList.add('show');
  clearTimeout(_demoToastTimer);
  _demoToastTimer = setTimeout(() => el.classList.remove('show'), 4500);
}

function pickTypeLocked(e) {
  e.preventDefault();
  const card = document.getElementById('opt-personal');
  if (!card) return;
  card.classList.remove('shake-locked', 'locked-red');
  void card.offsetWidth;
  card.classList.add('shake-locked', 'locked-red');
  setTimeout(() => card.classList.remove('shake-locked'), 500);
  setTimeout(() => card.classList.remove('locked-red'), 1400);
  showDemoToast(DEMO_PERSONAL_MSG);
}

const ROUTES = {
  school:   { student: '/portal', teacher: '/portal-teacher' },
  personal: { student: '/login-email-student.html', teacher: '/login-email-teacher.html' },
};

function pickType(type) {
  _type = type;
  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');

  s1.classList.add('slide-out');
  setTimeout(() => {
    s1.classList.add('hidden');
    s1.classList.remove('slide-out');

    document.getElementById('step2-sub').textContent = type === 'school'
      ? 'Đăng nhập bằng CCCD · Hệ thống trường'
      : 'Đăng nhập bằng email · Tài khoản cá nhân';

    s2.classList.remove('hidden');
    s2.classList.add('slide-in');
    setTimeout(() => s2.classList.remove('slide-in'), 400);
  }, 230);
}

function goBack() {
  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');

  s2.classList.add('slide-out');
  setTimeout(() => {
    s2.classList.add('hidden');
    s2.classList.remove('slide-out');
    s1.classList.remove('hidden');
    s1.classList.add('slide-back');
    setTimeout(() => s1.classList.remove('slide-back'), 400);
  }, 230);
}

function goLogin(role) {
  location.href = ROUTES[_type][role];
}
</script>
</body>
</html>
