<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Axon AI — Đăng ký</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--surface:#0d0d14;--surface2:#12121e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#7c5cfc;--accent2:#00e5ff;--accent-soft:rgba(124,92,252,.15);
  --text:#e8e8f0;--muted:#6b6b80;--muted2:#9090a8;
  --danger:#f87171;--success:#34d399
}
html,body{min-height:100%;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-feature-settings:'calt','kern','liga';
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;overflow-y:auto
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4
}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,#7c5cfc,transparent);opacity:.07;top:-150px;left:-150px;animation:orb1 22s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,#00e5ff,transparent);opacity:.06;bottom:-120px;right:-100px;animation:orb2 28s ease-in-out infinite}
.bg-orb-3{width:350px;height:350px;background:radial-gradient(circle,#9c5cfc,transparent);opacity:.04;top:45%;left:45%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,100px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,-70px)}}
@keyframes orb3{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

.card{
  position:relative;z-index:10;
  background:var(--surface);
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px;padding:40px 36px;
  width:100%;max-width:440px;
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px rgba(124,92,252,.05);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.logo{
  display:flex;align-items:center;gap:10px;margin-bottom:28px;
  justify-content:center;font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;font-size:1.25rem;letter-spacing:-.03em;color:white
}
.logo-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;flex-shrink:0;
  box-shadow:0 4px 20px rgba(124,92,252,.4)
}
.logo-icon::after{
  content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);
  animation:logoShimmer 4s ease-in-out infinite
}
@keyframes logoShimmer{0%{left:-60%}40%,100%{left:130%}}

/* ─── Tabs ─────────────────────── */
.tabs{
  display:flex;background:var(--surface2);
  border:1px solid var(--border);
  border-radius:13px;padding:4px;margin-bottom:28px;gap:3px
}
.tab{
  flex:1;padding:10px 8px;text-align:center;border:none;background:none;
  color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.84rem;font-weight:600;cursor:pointer;
  border-radius:10px;transition:all .22s;line-height:1.3;letter-spacing:.01em
}
.tab.active{
  background:linear-gradient(135deg,var(--accent),#9c7dff);
  color:white;box-shadow:0 3px 12px rgba(124,92,252,.35)
}
.tab:not(.active):hover{color:var(--muted2)}

/* ─── Form panels ───────────────── */

.heading{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:1.55rem;letter-spacing:-.03em;color:white;
  text-align:center;margin-bottom:6px;line-height:1.2
}
.sub{font-size:.84rem;color:var(--muted);text-align:center;margin-bottom:22px;line-height:1.6}

.field{display:flex;flex-direction:column;gap:7px;margin-bottom:15px}
.field label{font-size:.79rem;font-weight:600;color:var(--muted2);letter-spacing:.01em}
.input-wrap{position:relative}

.s-input{
  background:var(--surface2);border:1px solid var(--border2);border-radius:11px;
  padding:12px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%
}
.s-input:focus{border-color:rgba(124,92,252,.55);box-shadow:0 0 0 3px rgba(124,92,252,.1)}
.s-input::placeholder{color:var(--muted)}
.pw-input{padding-right:44px}

.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;background:none;border:none;cursor:pointer;
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:color .15s;border-radius:6px;padding:0;flex-shrink:0
}
.pw-toggle:hover{color:var(--muted2)}

/* Password strength bar */
.pw-strength{height:3px;border-radius:4px;background:var(--border2);margin-top:6px;overflow:hidden}
.pw-strength-bar{height:100%;border-radius:4px;width:0;transition:width .3s,background .3s}
.pw-strength-label{font-size:.7rem;color:var(--muted);margin-top:4px}

/* ReactBits-inspired Fade Content reveal for confirm password */
.confirm-field{
  opacity:0;
  max-height:0;
  overflow:hidden;
  transform:translateY(16px) scale(.97);
  filter:blur(8px);
  pointer-events:none;
  transition:max-height .45s cubic-bezier(.22,1,.36,1),opacity .28s ease,transform .45s cubic-bezier(.22,1,.36,1),filter .45s ease;
}
.confirm-field .input-wrap{width:100%}
.confirm-field.is-visible{
  opacity:1;
  max-height:160px;
  transform:translateY(0) scale(1);
  filter:blur(0);
  pointer-events:auto;
  animation:rbFadeContent .48s cubic-bezier(.22,1,.36,1);
}
@keyframes rbFadeContent{
  0%{opacity:0;transform:translateY(18px) scale(.96);filter:blur(10px)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-6px)}30%{transform:translateX(6px)}
  45%{transform:translateX(-4px)}60%{transform:translateX(4px)}
  75%{transform:translateX(-2px)}90%{transform:translateX(2px)}
}
.field.shake .s-input{
  animation:shake .45s cubic-bezier(.36,.07,.19,.97) both;
  border-color:rgba(248,113,113,.5)!important;box-shadow:0 0 0 3px rgba(248,113,113,.08)!important
}

.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent),#9c7dff);
  border:none;border-radius:11px;color:white;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;
  margin-top:6px;position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(124,92,252,.3)
}
.btn-primary:hover:not(:disabled){opacity:.92;transform:translateY(-1px);box-shadow:0 8px 28px rgba(124,92,252,.4)}
.btn-primary:active:not(:disabled){transform:translateY(0) scale(.99)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-primary::after{
  content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  animation:btnShimmer 3s ease-in-out infinite
}
@keyframes btnShimmer{0%{left:-80%}40%,100%{left:120%}}

.btn-spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:white;
  border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:7px
}
@keyframes spin{to{transform:rotate(360deg)}}

.msg{font-size:.8rem;padding:10px 13px;border-radius:9px;margin-top:12px;display:none;align-items:center;gap:8px;line-height:1.5}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5;display:flex}
.msg.ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success);display:flex}

.divider{height:1px;background:var(--border);margin:20px 0}
.footer-txt{font-size:.74rem;color:var(--muted);text-align:center;line-height:1.8}
.footer-txt a{color:var(--accent2);text-decoration:none;font-weight:600}
.footer-txt a:hover{text-decoration:underline}

@media(max-width:480px){
  .card{padding:28px 22px;border-radius:20px;margin:8px}
  .heading{font-size:1.35rem}
  .logo{margin-bottom:20px}
  body{padding:12px}
}
@media(max-width:360px){.card{padding:22px 16px}.heading{font-size:1.2rem}}

/* ─── Confirm Modal ─────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .22s
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;padding:32px 28px;width:100%;max-width:400px;
  box-shadow:0 40px 80px rgba(0,0,0,.6);
  transform:translateY(16px) scale(.97);transition:transform .25s cubic-bezier(.22,1,.36,1)
}
.modal-overlay.show .modal{transform:translateY(0) scale(1)}
.modal-icon{
  width:52px;height:52px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--accent),#9c7dff);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(124,92,252,.35)
}
.modal-title{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:1.25rem;letter-spacing:-.03em;color:white;
  text-align:center;margin-bottom:6px
}
.modal-sub{font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:20px}
.modal-info{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:16px;margin-bottom:20px;display:flex;flex-direction:column;gap:12px
}
.modal-row{display:flex;flex-direction:column;gap:3px}
.modal-row-label{font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.modal-row-value{font-size:.92rem;font-weight:600;color:var(--text);word-break:break-all}
.modal-actions{display:flex;gap:10px}
.btn-confirm{
  flex:1;padding:12px;
  background:linear-gradient(135deg,var(--accent),#9c7dff);
  border:none;border-radius:10px;color:white;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .15s;
  box-shadow:0 4px 16px rgba(124,92,252,.3)
}
.btn-confirm:hover{opacity:.9;transform:translateY(-1px)}
.btn-cancel{
  flex:1;padding:12px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;color:var(--muted2);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:background .2s,color .2s
}
.btn-cancel:hover{background:var(--border2);color:var(--text)}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    Axon AI
  </div>

  <!-- ── Đăng ký ── -->
  <div id="panel-register">
    <div class="heading">Tạo tài khoản 🚀</div>
    <div class="sub">Đăng ký miễn phí · Dành cho học sinh &amp; giáo viên</div>

    <form onsubmit="doRegister(event)" autocomplete="on" novalidate>
      <div class="field" id="rf-name">
        <label for="r-name">Họ và tên</label>
        <div class="input-wrap">
          <input class="s-input" type="text" id="r-name" name="fullName"
            placeholder="Nguyễn Văn A" required autocomplete="name">
        </div>
      </div>

      <div class="field" id="rf-email">
        <label for="r-email">Email</label>
        <div class="input-wrap">
          <input class="s-input" type="email" id="r-email" name="email"
            placeholder="ten@gmail.com" required autocomplete="email">
        </div>
      </div>

      <div class="field" id="rf-pw">
        <label for="r-pw">Mật khẩu</label>
        <div class="input-wrap">
          <input class="s-input pw-input" type="password" id="r-pw" name="password"
            placeholder="Tối thiểu 8 ký tự" required autocomplete="new-password"
            oninput="checkStrength(this.value);revealConfirm(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('r-pw','r-eye')" title="Hiện/ẩn mật khẩu" aria-label="Hiện mật khẩu">
            <svg id="r-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="strength-bar"></div></div>
        <div class="pw-strength-label" id="strength-label"></div>
      </div>

      <div class="field confirm-field" id="rf-pw2">
        <label for="r-pw2">Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <input class="s-input pw-input" type="password" id="r-pw2" name="password2"
            placeholder="Nhập lại mật khẩu" required autocomplete="new-password" disabled>
          <button type="button" class="pw-toggle" onclick="togglePw('r-pw2','r-eye2')" title="Hiện/ẩn mật khẩu" aria-label="Hiện mật khẩu">
            <svg id="r-eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="msg" id="r-msg"></div>
      <button class="btn-primary" type="submit" id="r-btn">Tạo tài khoản</button>
    </form>
  </div>

  <div class="divider"></div>
  <div class="footer-txt">
    Đã có tài khoản? <a href="/login.html">Đăng nhập →</a>
  </div>
  <div class="footer-txt" style="margin-top:6px">
    Giáo viên? <a href="/register-teacher.html">Tạo tài khoản giáo viên ↗</a>
  </div>
</div>

<!-- ── Confirmation Modal ── -->
<div class="modal-overlay" id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-txt">
  <div class="modal">
    <div class="modal-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="modal-title" id="modal-title-txt">Xác nhận thông tin</div>
    <div class="modal-sub">Vui lòng kiểm tra lại trước khi tạo tài khoản</div>
    <div class="modal-info">
      <div class="modal-row">
        <span class="modal-row-label">Họ và tên</span>
        <span class="modal-row-value" id="confirm-name"></span>
      </div>
      <div class="modal-row">
        <span class="modal-row-label">Email</span>
        <span class="modal-row-value" id="confirm-email"></span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfirm()">✎ Chỉnh sửa</button>
      <button class="btn-confirm" id="confirm-ok-btn" onclick="submitRegister()">✓ Xác nhận</button>
    </div>
  </div>
</div>

<script>
// Nếu đã đăng nhập thì redirect
(async () => {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) { const d = await r.json(); location.href = d.role === 'admin' ? '/admin.html' : '/chat.html'; }
  } catch {}
})();

// ── Password visibility toggle ─────────────────────────
const _pw = {};
function togglePw(inputId, iconId) {
  _pw[inputId] = !_pw[inputId];
  const inp = document.getElementById(inputId);
  inp.type = _pw[inputId] ? 'text' : 'password';
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById(iconId);
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (_pw[inputId]) {
    const p = document.createElementNS(NS, 'path');
    p.setAttribute('d', 'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24');
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('x1','1'); l.setAttribute('y1','1'); l.setAttribute('x2','23'); l.setAttribute('y2','23');
    svg.appendChild(p); svg.appendChild(l);
  } else {
    const p = document.createElementNS(NS, 'path');
    p.setAttribute('d', 'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z');
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx','12'); c.setAttribute('cy','12'); c.setAttribute('r','3');
    svg.appendChild(p); svg.appendChild(c);
  }
}

// ── Password strength ──────────────────────────────────
function checkStrength(pw) {
  const bar = document.getElementById('strength-bar');
  const lbl = document.getElementById('strength-label');
  if (!pw) { bar.style.width = '0'; lbl.textContent = ''; return; }
  let score = 0;
  if (pw.length >= 8)          score++;
  if (/[a-z]/.test(pw))        score++;
  if (/[A-Z]/.test(pw))        score++;
  if (/\d/.test(pw))           score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w:'20%', c:'#f87171', t:'Rất yếu — cần chữ hoa, chữ thường, số, ký tự đặc biệt' },
    { w:'40%', c:'#fb923c', t:'Yếu' },
    { w:'60%', c:'#facc15', t:'Trung bình' },
    { w:'80%', c:'#4ade80', t:'Tốt' },
    { w:'100%',c:'#34d399', t:'Mạnh ✓' },
  ];
  const lvl = levels[Math.min(score - 1, 4)] || levels[0];
  bar.style.width = lvl.w;
  bar.style.background = lvl.c;
  lbl.style.color = lvl.c;
  lbl.textContent = lvl.t;
}

// ── Shake field helper ─────────────────────────────────
function shake(id) {
  const f = document.getElementById(id);
  f.classList.remove('shake'); void f.offsetWidth; f.classList.add('shake');
  setTimeout(() => f.classList.remove('shake'), 500);
}

// ── Đăng ký ───────────────────────────────────────────
let _pendingRegister = null;

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  _pendingRegister = null;
}

// Close modal when clicking overlay background
document.getElementById('confirm-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

function revealConfirm(pw) {
  const field = document.getElementById('rf-pw2');
  const input = document.getElementById('r-pw2');
  const shouldShow = pw.length >= 8;
  field.classList.toggle('is-visible', shouldShow);
  input.disabled = !shouldShow;
  if (!shouldShow) input.value = '';
}

function validateFullName(name) {
  if (!name) return 'Vui lòng nhập họ tên';
  const parts = name.split(/\s+/).filter(Boolean);
  if (parts.length < 2) return 'Họ tên phải có ít nhất 2 từ (ví dụ: Nguyễn Văn A)';
  if (parts.some(w => w.length < 2)) return 'Mỗi từ trong họ tên phải có ít nhất 2 ký tự';
  if (name.replace(/\s/g, '').length < 6) return 'Họ tên quá ngắn';
  if (/[0-9]/.test(name)) return 'Họ tên không được chứa số';
  if (/[!@#$%^&*()_+=\[\]{};:"\\|,<>\/?]/.test(name)) return 'Họ tên không được chứa ký tự đặc biệt';
  if (/(.)\1{2,}/u.test(name.replace(/\s/g, ''))) return 'Họ tên không hợp lệ (chứa ký tự lặp bất thường)';
  const vowelRe = /[aăâeêioôơuưyàáảãạăắằẳẵặâấầẩẫậèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵAĂÂEÊIOÔƠUƯYÀÁẢÃẠĂẮẰẲẴẶÂẤẦẨẪẬÈÉẺẼẸÊẾỀỂỄỆÌÍỈĨỊÒÓỎÕỌÔỐỒỔỖỘƠỚỜỞỠỢÙÚỦŨỤƯỨỪỬỮỰỲÝỶỸỴ]/;
  if (parts.some(w => !vowelRe.test(w))) return 'Họ tên không hợp lệ (mỗi từ phải có nguyên âm)';
  return null;
}

async function doRegister(e) {
  e.preventDefault();
  const msg      = document.getElementById('r-msg');
  const fullName = document.getElementById('r-name').value.trim();
  const email    = document.getElementById('r-email').value.trim();
  const pw       = document.getElementById('r-pw').value;
  const pw2      = document.getElementById('r-pw2').value;

  msg.className = 'msg';

  const nameErr = validateFullName(fullName);
  if (nameErr) { shake('rf-name'); msg.textContent = '⚠ ' + nameErr; msg.className = 'msg err'; return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { shake('rf-email'); msg.textContent = '⚠ Email không hợp lệ'; msg.className = 'msg err'; return; }
  if (pw.length < 8) { shake('rf-pw'); msg.textContent = '⚠ Mật khẩu tối thiểu 8 ký tự'; msg.className = 'msg err'; return; }
  if (!/[a-z]/.test(pw)) { shake('rf-pw'); msg.textContent = '⚠ Mật khẩu phải có ít nhất 1 chữ thường (a-z)'; msg.className = 'msg err'; return; }
  if (!/[A-Z]/.test(pw)) { shake('rf-pw'); msg.textContent = '⚠ Mật khẩu phải có ít nhất 1 chữ hoa (A-Z)'; msg.className = 'msg err'; return; }
  if (!/\d/.test(pw)) { shake('rf-pw'); msg.textContent = '⚠ Mật khẩu phải có ít nhất 1 chữ số (0-9)'; msg.className = 'msg err'; return; }
  if (!/[^A-Za-z0-9]/.test(pw)) { shake('rf-pw'); msg.textContent = '⚠ Mật khẩu phải có ít nhất 1 ký tự đặc biệt (!@#$…)'; msg.className = 'msg err'; return; }
  if (pw !== pw2) { shake('rf-pw2'); msg.textContent = '⚠ Mật khẩu xác nhận không khớp'; msg.className = 'msg err'; return; }
  _pendingRegister = { fullName, email, password: pw };

  // Hiển thị modal xác nhận
  document.getElementById('confirm-name').textContent = fullName;
  document.getElementById('confirm-email').textContent = email;
  document.getElementById('confirm-overlay').classList.add('show');
  document.getElementById('confirm-ok-btn').focus();
}

async function submitRegister() {
  if (!_pendingRegister) return;
  const btn    = document.getElementById('r-btn');
  const msg    = document.getElementById('r-msg');
  const okBtn  = document.getElementById('confirm-ok-btn');
  const data   = _pendingRegister;

  okBtn.disabled = true;
  okBtn.innerHTML = '<span class="btn-spinner"></span>Đang tạo…';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();

    okBtn.disabled = false;
    okBtn.textContent = '✓ Xác nhận';
    closeConfirm();

    if (!res.ok) {
      msg.textContent = '⚠ ' + (json.error || 'Đăng ký thất bại');
      msg.className = 'msg err';
      btn.disabled = false;
      btn.textContent = 'Tạo tài khoản';
      return;
    }

    localStorage.setItem('hc_role', json.role);
    localStorage.setItem('hc_fullName', json.fullName);
    localStorage.setItem('hc_className', '');
    localStorage.setItem('hc_gender', '');
    localStorage.setItem('hc_dob', '');
    localStorage.setItem('hc_mustChangePw', '0');

    msg.textContent = '✓ Tài khoản đã tạo! Đang vào ứng dụng…';
    msg.className = 'msg ok';
    setTimeout(() => { location.href = '/chat.html'; }, 700);
  } catch {
    okBtn.disabled = false;
    okBtn.textContent = '✓ Xác nhận';
    closeConfirm();
    msg.textContent = '⚠ Lỗi kết nối. Vui lòng thử lại.';
    msg.className = 'msg err';
    btn.disabled = false;
    btn.textContent = 'Tạo tài khoản';
  }
}

</script>
