<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Axon AI — Đăng nhập Giáo viên</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040a09;--surface:#0a1412;--surface2:#101e1b;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#0d9488;--accent2:#22d3ee;--accent-soft:rgba(13,148,136,.15);
  --text:#e8f0ef;--muted:#6b7f7d;--muted2:#90a8a5;
  --danger:#f87171;--success:#34d399
}
html,body{min-height:100%;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-feature-settings:'calt','kern','liga';
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;overflow-y:auto
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4
}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,#0d9488,transparent);opacity:.1;top:-150px;left:-150px;animation:orb1 22s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,#22d3ee,transparent);opacity:.07;bottom:-120px;right:-100px;animation:orb2 28s ease-in-out infinite}
.bg-orb-3{width:350px;height:350px;background:radial-gradient(circle,#0891b2,transparent);opacity:.05;top:45%;left:45%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,100px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,-70px)}}
@keyframes orb3{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

.card{
  position:relative;z-index:10;background:var(--surface);
  border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px 36px;
  width:100%;max-width:420px;
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px rgba(13,148,136,.07);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:-.03em;color:white}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#0d9488,#22d3ee);border-radius:11px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 4px 20px rgba(13,148,136,.45)}
.logo-icon::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);animation:logoShimmer 4s ease-in-out infinite}
@keyframes logoShimmer{0%{left:-60%}40%,100%{left:130%}}

.role-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(13,148,136,.15);border:1px solid rgba(13,148,136,.35);
  border-radius:30px;padding:5px 14px;font-size:.75rem;font-weight:700;
  color:#22d3ee;letter-spacing:.04em;text-transform:uppercase;
  margin:0 auto 20px;width:fit-content
}

.heading{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.55rem;letter-spacing:-.03em;color:white;text-align:center;margin-bottom:6px;line-height:1.2}
.sub{font-size:.84rem;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.6}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:15px}
.field label{font-size:.79rem;font-weight:600;color:var(--muted2);letter-spacing:.01em}
.input-wrap{position:relative}
.s-input{background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:12px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.s-input:focus{border-color:rgba(13,148,136,.6);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.s-input::placeholder{color:var(--muted)}
.pw-input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:28px;height:28px;background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:color .15s;border-radius:6px;padding:0;flex-shrink:0}
.pw-toggle:hover{color:var(--muted2)}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}}
.field.shake .s-input{animation:shake .45s cubic-bezier(.36,.07,.19,.97) both;border-color:rgba(248,113,113,.5)!important;box-shadow:0 0 0 3px rgba(248,113,113,.08)!important}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#0d9488,#22d3ee);border:none;border-radius:11px;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;margin-top:6px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(13,148,136,.35)}
.btn-primary:hover:not(:disabled){opacity:.92;transform:translateY(-1px);box-shadow:0 8px 28px rgba(13,148,136,.45)}
.btn-primary:active:not(:disabled){transform:translateY(0) scale(.99)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-primary::after{content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:btnShimmer 3s ease-in-out infinite}
@keyframes btnShimmer{0%{left:-80%}40%,100%{left:120%}}
.btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:.8rem;padding:10px 13px;border-radius:9px;margin-top:12px;display:none;align-items:center;gap:8px;line-height:1.5}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5;display:flex}
.msg.ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success);display:flex}
.divider{height:1px;background:var(--border);margin:20px 0}
.footer-txt{font-size:.74rem;color:var(--muted);text-align:center;line-height:1.9}
.footer-txt a{color:#22d3ee;text-decoration:none;font-weight:600}
.footer-txt a:hover{text-decoration:underline}
@media(max-width:480px){.card{padding:28px 22px;border-radius:20px;margin:8px}.heading{font-size:1.35rem}.logo{margin-bottom:20px}body{padding:12px}}
@media(max-width:400px){.card{padding:24px 16px}.heading{font-size:1.2rem}}
@media(max-width:360px){.card{padding:22px 16px}.heading{font-size:1.2rem}}
html{overflow-x:hidden}
body{overflow-wrap:break-word}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    Axon AI
  </div>

  <div class="role-badge"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg> Giáo viên</div>

  <div class="heading">Chào mừng thầy/cô</div>
  <div class="sub">Đăng nhập tài khoản giáo viên cá nhân</div>

  <form onsubmit="doLogin(event)" autocomplete="on" novalidate>
    <div class="field" id="f-email">
      <label for="email">Email</label>
      <div class="input-wrap">
        <input class="s-input" type="email" id="email" name="email"
          placeholder="giaovien@gmail.com" required autocomplete="email">
      </div>
    </div>
    <div class="field" id="f-pw">
      <label for="pw">Mật khẩu</label>
      <div class="input-wrap">
        <input class="s-input pw-input" type="password" id="pw" name="password"
          placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Hiện mật khẩu">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="msg" id="msg"></div>
    <button class="btn-primary" type="submit" id="btn">Đăng nhập</button>
  </form>

  <div class="divider"></div>
  <div class="footer-txt">
    Chưa có tài khoản? <a href="/register-teacher.html">Đăng ký giáo viên ↗</a><br>
    <a href="/forgot-password.html">Quên mật khẩu?</a> &nbsp;·&nbsp; <a href="/choose">← Chọn lại loại tài khoản</a>
  </div>
</div>

<script>
(async () => {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) { const d = await r.json(); location.href = d.role === 'admin' ? '/admin.html' : d.role === 'teacher' ? '/teacher.html' : '/chat.html'; }
  } catch {}
})();

let _pwVisible = false;
function togglePw() {
  _pwVisible = !_pwVisible;
  document.getElementById('pw').type = _pwVisible ? 'text' : 'password';
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('eye-icon');
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (_pwVisible) {
    const p = document.createElementNS(NS,'path'); p.setAttribute('d','M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24');
    const l = document.createElementNS(NS,'line'); l.setAttribute('x1','1');l.setAttribute('y1','1');l.setAttribute('x2','23');l.setAttribute('y2','23');
    svg.appendChild(p); svg.appendChild(l);
  } else {
    const p = document.createElementNS(NS,'path'); p.setAttribute('d','M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z');
    const c = document.createElementNS(NS,'circle'); c.setAttribute('cx','12');c.setAttribute('cy','12');c.setAttribute('r','3');
    svg.appendChild(p); svg.appendChild(c);
  }
}

function shake(id) {
  const f = document.getElementById(id);
  f.classList.remove('shake'); void f.offsetWidth; f.classList.add('shake');
  setTimeout(() => f.classList.remove('shake'), 500);
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value;

  msg.className = 'msg';
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Đang xác thực…';

  try {
    const res = await fetch('/api/auth/login-teacher', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const data = await res.json();
    if (!res.ok) {
      msg.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> ' + (data.error || 'Đăng nhập thất bại').replace(/</g,'&lt;');
      msg.className = 'msg err';
      shake('f-email'); shake('f-pw');
      btn.disabled = false; btn.textContent = 'Đăng nhập'; return;
    }
    localStorage.setItem('hc_role', data.role);
    localStorage.setItem('hc_fullName', data.fullName);
    localStorage.setItem('hc_className', '');
    localStorage.setItem('hc_gender', ''); localStorage.setItem('hc_dob', '');
    localStorage.setItem('hc_mustChangePw', '0');
    btn.textContent = '✓ Thành công!';
    setTimeout(() => { location.href = '/teacher.html'; }, 350);
  } catch {
    msg.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> Lỗi kết nối. Vui lòng thử lại.';
    msg.className = 'msg err';
    btn.disabled = false; btn.textContent = 'Đăng nhập';
  }
}
</script>
</body>
</html>
